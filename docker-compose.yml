# ============================================================
# Kenya Health Facility Mapping Pipeline
# docker-compose.yml
#
# Services:
#   postgres-airflow   — Airflow metadata DB
#   postgres-superset  — Superset metadata DB
#   redis              — Airflow Celery broker
#   minio              — S3-compatible data lake
#   minio-init         — one-shot bucket creator
#   trino              — SQL query engine over Iceberg
#   airflow-init       — DB migrate + admin user (runs once)
#   airflow-webserver
#   airflow-scheduler
#   airflow-worker
#   airflow-triggerer
#   superset
#
# Usage:
#   make build         — build custom Airflow + Superset images
#   make up            — start all services
#   make tofu-apply    — provision MinIO buckets (run after make up)
#   make superset-init — bootstrap Superset admin user
# ============================================================

x-airflow-common: &airflow-common
  build:
    context: ./airflow
    dockerfile: Dockerfile
  image: kenya-health-airflow
  env_file: .env
  environment:
    AIRFLOW__CORE__EXECUTOR: ${AIRFLOW__CORE__EXECUTOR}
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
    AIRFLOW__CELERY__BROKER_URL: ${AIRFLOW__CELERY__BROKER_URL}
    AIRFLOW__CELERY__RESULT_BACKEND: ${AIRFLOW__CELERY__RESULT_BACKEND}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    AIRFLOW__CORE__LOAD_EXAMPLES: ${AIRFLOW__CORE__LOAD_EXAMPLES}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY}
    # MinIO — passed to ingestion scripts and dbt via env
    MINIO_ENDPOINT: ${MINIO_ENDPOINT}
    MINIO_ROOT_USER: ${MINIO_ROOT_USER}
    MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    MINIO_RAW_BUCKET: ${MINIO_RAW_BUCKET}
    MINIO_ICEBERG_BUCKET: ${MINIO_ICEBERG_BUCKET}
    # Trino — used by dbt profiles.yml and ingestion
    TRINO_HOST: ${TRINO_HOST}
    TRINO_PORT: ${TRINO_PORT}
    TRINO_USER: ${TRINO_USER}
    TRINO_CATALOG: ${TRINO_CATALOG}
    TRINO_SCHEMA: ${TRINO_SCHEMA}
    # Data source APIs
    KMHFL_BASE_URL: ${KMHFL_BASE_URL}
    KMHFL_TOKEN: ${KMHFL_TOKEN}
    KNBS_POPULATION_URL: ${KNBS_POPULATION_URL}
    HDX_BASE_URL: ${HDX_BASE_URL}
    HDX_KENYA_DATASET_ID: ${HDX_KENYA_DATASET_ID}
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/plugins:/opt/airflow/plugins
    - ./airflow/logs:/opt/airflow/logs
    - ./ingestion:/opt/airflow/ingestion
    - ./dbt:/opt/airflow/dbt
  depends_on:
    postgres-airflow:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks:
    - kenya-health-net

services:

  # ── Postgres — Airflow metadata DB ───────────────────────
  postgres-airflow:
    image: postgres:13
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_AIRFLOW_USER}
      POSTGRES_PASSWORD: ${POSTGRES_AIRFLOW_PASSWORD}
      POSTGRES_DB: ${POSTGRES_AIRFLOW_DB}
    volumes:
      - postgres-airflow-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_AIRFLOW_USER} -d ${POSTGRES_AIRFLOW_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kenya-health-net
    restart: unless-stopped

  # ── Postgres — Superset metadata DB ──────────────────────
  postgres-superset:
    image: postgres:18
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_SUPERSET_USER}
      POSTGRES_PASSWORD: ${POSTGRES_SUPERSET_PASSWORD}
      POSTGRES_DB: ${POSTGRES_SUPERSET_DB}
    volumes:
      - postgres-superset-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_SUPERSET_USER} -d ${POSTGRES_SUPERSET_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kenya-health-net
    restart: unless-stopped

  # ── Redis — Airflow Celery broker ─────────────────────────
  redis:
    image: redis:7.2
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kenya-health-net
    restart: unless-stopped

  # ── MinIO — S3-compatible data lake ───────────────────────
  # Last open-source release before project was archived (Apr 2026)
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      # Use curl against the MinIO health endpoint — mc is not in this image
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - kenya-health-net
    restart: unless-stopped

  # ── MinIO init — creates buckets on first start ───────────
  # Runs once then exits. Uses minio/mc image (mc IS in this image).
  # MINIO_ENDPOINT in .env is http://minio:9000 — we strip the scheme
  # for mc alias set which expects host:port only.
  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    env_file: .env
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
        mc mb --ignore-existing local/$${MINIO_RAW_BUCKET};
        mc mb --ignore-existing local/$${MINIO_ICEBERG_BUCKET};
        echo 'Buckets ready: '$${MINIO_RAW_BUCKET}' '$${MINIO_ICEBERG_BUCKET};
      "
    networks:
      - kenya-health-net

  # ── Trino — SQL query engine over Iceberg ─────────────────
  trino:
    image: trinodb/trino:480
    env_file: .env
    ports:
      - "${TRINO_EXPOSED_PORT:-8081}:8080"
    volumes:
      - ./trino/etc:/etc/trino
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/info"]
      interval: 15s
      timeout: 5s
      retries: 10
    depends_on:
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - kenya-health-net
    restart: unless-stopped

  # ── Airflow init — runs once then exits ───────────────────
  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "airflow db migrate && airflow users create --username $${AIRFLOW_ADMIN_USER} --password $${AIRFLOW_ADMIN_PASSWORD} --firstname Kenya --lastname Health --role Admin --email $${AIRFLOW_ADMIN_EMAIL} || true"
    depends_on:
      postgres-airflow:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure
    networks:
      - kenya-health-net

  # ── Airflow webserver ─────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "${AIRFLOW_PORT:-8080}:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── Airflow scheduler ─────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── Airflow Celery worker — dbt runs inside here ──────────
  airflow-worker:
    <<: *airflow-common
    command: celery worker
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── Airflow triggerer ─────────────────────────────────────
  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── Superset — BI dashboards ──────────────────────────────
  superset:
    build:
      context: ./superset
      dockerfile: Dockerfile
    image: kenya-health-superset
    env_file: .env
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_SUPERSET_USER}:${POSTGRES_SUPERSET_PASSWORD}@postgres-superset:5432/${POSTGRES_SUPERSET_DB}
    ports:
      - "${SUPERSET_PORT:-8088}:8088"
    volumes:
      - ./superset/superset_config.py:/app/pythonpath/superset_config.py
      - ./superset/dashboards:/app/dashboards
    depends_on:
      postgres-superset:
        condition: service_healthy
      trino:
        condition: service_healthy
    networks:
      - kenya-health-net
    restart: unless-stopped

# ── Volumes ───────────────────────────────────────────────────
volumes:
  postgres-airflow-data:
  postgres-superset-data:
  minio-data:

# ── Network ───────────────────────────────────────────────────
networks:
  kenya-health-net:
    driver: bridge