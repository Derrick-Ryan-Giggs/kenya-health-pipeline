# ============================================================
# Kenya Health Facility Mapping Pipeline
# models/staging/schema.yml
# ============================================================
version: 2

sources:
  - name: raw
    description: Raw data ingested from MOH KMHFL, KNBS, and HDX APIs
    schema: raw
    tables:
      - name: facilities
        description: Raw MOH KMHFL facility list
      - name: population
        description: Raw KNBS population estimates
      - name: geodata
        description: Raw HDX Kenya county GeoJSON

models:
  - name: stg_facilities
    description: >
      Cleaned and normalized operational health facilities from MOH KMHFL.
      Facility types normalized to Hospital, Health Centre, Dispensary, Clinic.
    columns:
      - name: facility_id
        description: Unique KMHFR UUID — always populated
        tests: [not_null, unique]
      - name: facility_code
        description: MOH facility code — may be empty for unregistered facilities
        tests: [not_null]
      - name: facility_name
        description: Official facility name
        tests: [not_null]
      - name: facility_type
        description: Normalized facility type
        tests:
          - not_null
          - accepted_values:
              values: ['Hospital', 'Health Centre', 'Dispensary', 'Clinic', 'Other']
      - name: county_name
        description: Kenya county name
        tests: [not_null]
      - name: operation_status
        description: Must be Operational (filtered in staging)
        tests: [not_null]

  - name: stg_population
    description: Cleaned KNBS county and sub-county population estimates
    columns:
      - name: county_name
        description: Kenya county name
        tests: [not_null]
      - name: population
        description: Population count — must be positive
        tests: [not_null]

  - name: stg_geodata
    description: Kenya county boundary polygons from HDX
    columns:
      - name: county_name
        description: Kenya county name
        tests: [not_null]
      - name: geometry
        description: GeoJSON geometry string for choropleth map
        tests: [not_null]
