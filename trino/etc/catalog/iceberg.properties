# ============================================================
# Kenya Health Facility Mapping Pipeline
# trino/etc/catalog/iceberg.properties
#
# Connects Trino to Iceberg tables stored in MinIO.
# Uses MinIO's built-in S3-compatible API as the file store.
# REST catalog points at MinIO endpoint.
#
# Mounted into container at /etc/trino/catalog/iceberg.properties
# ============================================================

connector.name=iceberg

# ── Iceberg REST catalog ──────────────────────────────────────
# MinIO exposes an Iceberg REST catalog at its S3 endpoint
iceberg.catalog.type=rest
iceberg.rest-catalog.uri=http://minio:9000

# ── File format ───────────────────────────────────────────────
iceberg.file-format=PARQUET

# ── S3 / MinIO storage ────────────────────────────────────────
fs.native-s3.enabled=true
s3.endpoint=http://minio:9000
s3.region=us-east-1
s3.path-style-access=true

# Credentials read from environment variables at runtime
s3.aws-access-key=${ENV:MINIO_ROOT_USER}
s3.aws-secret-key=${ENV:MINIO_ROOT_PASSWORD}