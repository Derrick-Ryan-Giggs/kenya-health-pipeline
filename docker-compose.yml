# ============================================================
# Kenya Health Facility Mapping Pipeline
# docker-compose.yml
# ============================================================

x-airflow-common: &airflow-common
  build:
    context: ./airflow
    dockerfile: Dockerfile
  image: kenya-health-airflow
  env_file: .env
  environment:
    AIRFLOW__CORE__EXECUTOR: ${AIRFLOW__CORE__EXECUTOR}
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
    AIRFLOW__CELERY__BROKER_URL: ${AIRFLOW__CELERY__BROKER_URL}
    AIRFLOW__CELERY__RESULT_BACKEND: ${AIRFLOW__CELERY__RESULT_BACKEND}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    AIRFLOW__CORE__LOAD_EXAMPLES: ${AIRFLOW__CORE__LOAD_EXAMPLES}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY}
    AIRFLOW__WEBSERVER__SESSION_LIFETIME_MINUTES: 43200
    AIRFLOW__WEBSERVER__COOKIE_SAMESITE: Lax
    AIRFLOW__WEBSERVER__COOKIE_SECURE: "false"
    AIRFLOW__WEBSERVER__WORKERS: ${AIRFLOW__WEBSERVER__WORKERS}
    MINIO_ENDPOINT: ${MINIO_ENDPOINT}
    MINIO_ROOT_USER: ${MINIO_ROOT_USER}
    MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    MINIO_RAW_BUCKET: ${MINIO_RAW_BUCKET}
    MINIO_ICEBERG_BUCKET: ${MINIO_ICEBERG_BUCKET}
    TRINO_HOST: ${TRINO_HOST}
    TRINO_PORT: ${TRINO_PORT}
    TRINO_USER: ${TRINO_USER}
    TRINO_CATALOG: ${TRINO_CATALOG}
    TRINO_SCHEMA: ${TRINO_SCHEMA}
    KNBS_POPULATION_URL: ${KNBS_POPULATION_URL}
   
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/plugins:/opt/airflow/plugins
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/webserver_config.py:/opt/airflow/webserver_config.py
    - ./ingestion:/opt/airflow/ingestion
    - ./dbt:/opt/airflow/dbt
  networks:
    - kenya-health-net

x-superset-common: &superset-common
  build:
    context: ./superset
    dockerfile: Dockerfile
  image: kenya-health-superset
  env_file: .env
  environment:
    SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
    DATABASE_URL: postgresql+psycopg2://${POSTGRES_SUPERSET_USER}:${POSTGRES_SUPERSET_PASSWORD}@postgres-superset:5432/${POSTGRES_SUPERSET_DB}
    REDIS_HOST: redis
  volumes:
    - ./superset/superset_config.py:/app/pythonpath/superset_config.py
    - ./superset/dashboards:/app/dashboards
  networks:
    - kenya-health-net

services:

  postgres-airflow:
    image: postgres:13
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_AIRFLOW_USER}
      POSTGRES_PASSWORD: ${POSTGRES_AIRFLOW_PASSWORD}
      POSTGRES_DB: ${POSTGRES_AIRFLOW_DB}
    volumes:
      - postgres-airflow-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_AIRFLOW_USER} -d ${POSTGRES_AIRFLOW_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kenya-health-net
    restart: unless-stopped

  postgres-superset:
    image: postgres:18
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_SUPERSET_USER}
      POSTGRES_PASSWORD: ${POSTGRES_SUPERSET_PASSWORD}
      POSTGRES_DB: ${POSTGRES_SUPERSET_DB}
    volumes:
      - postgres-superset-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_SUPERSET_USER} -d ${POSTGRES_SUPERSET_DB}"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s
    networks:
      - kenya-health-net
    restart: unless-stopped

  redis:
    image: redis:7.2
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kenya-health-net
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - kenya-health-net
    restart: unless-stopped

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    env_file: .env
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
        mc mb --ignore-existing local/$${MINIO_RAW_BUCKET};
        mc mb --ignore-existing local/$${MINIO_ICEBERG_BUCKET};
        echo 'Buckets ready';
      "
    networks:
      - kenya-health-net
    restart: "no"

  trino:
    image: trinodb/trino:480
    env_file: .env
    ports:
      - "${TRINO_EXPOSED_PORT:-8081}:8080"
    volumes:
      - ./trino/etc:/etc/trino
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/info"]
      interval: 15s
      timeout: 5s
      retries: 10
    depends_on:
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - kenya-health-net
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "airflow db migrate && airflow users create --username $${AIRFLOW_ADMIN_USER} --password $${AIRFLOW_ADMIN_PASSWORD} --firstname Kenya --lastname Health --role Admin --email $${AIRFLOW_ADMIN_EMAIL} || true"
    depends_on:
      postgres-airflow:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: "no"
    networks:
      - kenya-health-net

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "${AIRFLOW_PORT:-8080}:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres-airflow:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres-airflow:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  airflow-worker:
    <<: *airflow-common
    command: celery worker
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres-airflow:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres-airflow:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Runs once on fresh start: migrates DB, creates admin user, syncs roles
  superset-init:
    <<: *superset-common
    command: >
      bash -c "
        superset db upgrade &&
        superset fab create-admin
          --username ${SUPERSET_ADMIN_USER}
          --firstname Admin
          --lastname User
          --email ${SUPERSET_ADMIN_EMAIL}
          --password ${SUPERSET_ADMIN_PASSWORD} || true &&
        superset init
      "
    depends_on:
      postgres-superset:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: "no"

  superset:
    <<: *superset-common
    ports:
      - "${SUPERSET_PORT:-8088}:8088"
    depends_on:
      superset-init:
        condition: service_completed_successfully
      postgres-superset:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  postgres-airflow-data:
  postgres-superset-data:
  minio-data:

networks:
  kenya-health-net:
    driver: bridge